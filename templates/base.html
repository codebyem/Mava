<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mava{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <nav class="site-nav">
        <div class="site-nav__inner">
            <a href="/" class="site-nav__logo">Mava</a>
            <div class="site-nav__links">
                <a href="/home"       class="nav-link {% if request.endpoint == 'home'       %}nav-link--active{% endif %}">Dashboard</a>
                <a href="/activities" class="nav-link {% if request.endpoint == 'activities'  %}nav-link--active{% endif %}">Activities</a>
                <a href="/analytics"  class="nav-link {% if request.endpoint == 'analytics'   %}nav-link--active{% endif %}">Analytics</a>
                <a href="/records"    class="nav-link {% if request.endpoint == 'records'     %}nav-link--active{% endif %}">Records</a>
                <a href="/settings" class="nav-icon-btn" title="Settings">
                    <span class="material-symbols-rounded">settings</span>
                </a>
            </div>
        </div>
    </nav>

    <nav class="bottom-nav">
        <a href="/home"       class="bottom-nav__item {% if request.endpoint == 'home'       %}bottom-nav__item--active{% endif %}">
            <span class="material-symbols-rounded">home</span>
            <span>Home</span>
        </a>
        <a href="/activities" class="bottom-nav__item {% if request.endpoint == 'activities'  %}bottom-nav__item--active{% endif %}">
            <span class="material-symbols-rounded">format_list_bulleted</span>
            <span>Activities</span>
        </a>
        <a href="/analytics"  class="bottom-nav__item {% if request.endpoint == 'analytics'   %}bottom-nav__item--active{% endif %}">
            <span class="material-symbols-rounded">analytics</span>
            <span>Analytics</span>
        </a>
        <a href="/records"    class="bottom-nav__item {% if request.endpoint == 'records'     %}bottom-nav__item--active{% endif %}">
            <span class="material-symbols-rounded">emoji_events</span>
            <span>Records</span>
        </a>
        <a href="/settings"   class="bottom-nav__item {% if request.endpoint == 'settings'    %}bottom-nav__item--active{% endif %}">
            <span class="material-symbols-rounded">settings</span>
            <span>Settings</span>
        </a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        &copy; 2026 Mava &mdash; Powered by Strava API
    </footer>

</body>
</html>
